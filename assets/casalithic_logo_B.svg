<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- ── ICON: Italian arch / doorway with CL inside ── -->
  <!-- Outer arch shape -->
  <path d="M16 100 L16 52 Q16 12 60 12 Q104 12 104 52 L104 100" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Base line -->
  <line x1="10" y1="100" x2="110" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Inner arch (double-line detail) -->
  <path d="M26 100 L26 54 Q26 24 60 24 Q94 24 94 54 L94 100" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  <!-- Keystone top detail -->
  <line x1="60" y1="12" x2="60" y2="4" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="52" y1="4" x2="68" y2="4" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Column base caps -->
  <line x1="10" y1="106" x2="50" y2="106" stroke="#1a1a1a" stroke-width="1.0"/>
  <line x1="70" y1="106" x2="110" y2="106" stroke="#1a1a1a" stroke-width="1.0"/>
  <!-- CL monogram inside arch -->
  <text x="60" y="76" font-family="'Playfair Display', Georgia, serif" font-size="30" font-weight="400" text-anchor="middle" fill="#1a1a1a" letter-spacing="-1">CL</text>

  <!-- ── DIVIDER ── -->
  <line x1="128" y1="18" x2="128" y2="104" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>

  <!-- ── WORDMARK ── -->
  <text x="144" y="60" font-family="'Playfair Display', Georgia, serif" font-size="30" font-weight="400" letter-spacing="6" fill="#1a1a1a">CASALITHIC</text>
  <text x="146" y="79" font-family="'Playfair Display', Georgia, serif" font-size="9.5" font-weight="400" letter-spacing="6.5" fill="#1a1a1a" opacity="0.58">INTERIORS &amp; FURNISHINGS</text>
</svg>
