<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="48"/>
    </clipPath>
  </defs>

  <!-- ── ICON: Tree ring cross-section with C centre ── -->
  <!-- Concentric rings — wood grain feel -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  <circle cx="60" cy="60" r="41" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="60" cy="60" r="34" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <circle cx="60" cy="60" r="27" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
  <circle cx="60" cy="60" r="20" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="60" cy="60" r="13" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Slight organic wobble lines on two rings via paths -->
  <path d="M60 19 Q68 26 60 34 Q52 42 60 49 Q68 56 60 60" fill="none" stroke="#1a1a1a" stroke-width="0.4" opacity="0.35"/>
  <path d="M60 12 Q72 22 60 36 Q48 50 60 60" fill="none" stroke="#1a1a1a" stroke-width="0.4" opacity="0.2"/>
  <!-- C letterform centred -->
  <text x="60" y="67" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="400" text-anchor="middle" fill="#1a1a1a" letter-spacing="0">C</text>

  <!-- ── DIVIDER ── -->
  <line x1="122" y1="22" x2="122" y2="98" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>

  <!-- ── WORDMARK ── -->
  <text x="138" y="58" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="400" letter-spacing="5" fill="#1a1a1a">CASALITHIC</text>
  <!-- Tagline -->
  <text x="140" y="77" font-family="'Cormorant Garamond', Georgia, serif" font-size="10" font-weight="300" letter-spacing="5.5" fill="#1a1a1a" opacity="0.6">INTERIORS &amp; FURNISHINGS</text>
</svg>
