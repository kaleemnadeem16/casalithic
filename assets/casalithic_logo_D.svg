<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&amp;display=swap');
    </style>
    <clipPath id="rectClip">
      <rect x="16" y="8" width="88" height="104" rx="3"/>
    </clipPath>
  </defs>

  <!-- ── ICON: Rounded rect frame with split — left half cabinet joinery, right half wood grain ── -->
  <!-- Outer rounded rectangle frame -->
  <rect x="16" y="8" width="88" height="104" rx="3" fill="none" stroke="#1a1a1a" stroke-width="1.6"/>

  <!-- Vertical centre divider inside -->
  <line x1="60" y1="8" x2="60" y2="112" stroke="#1a1a1a" stroke-width="1.0"/>

  <!-- LEFT HALF — cabinet joinery grid -->
  <g clip-path="url(#rectClip)">
    <!-- Horizontal shelf lines left side -->
    <line x1="16" y1="44" x2="60" y2="44" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="16" y1="76" x2="60" y2="76" stroke="#1a1a1a" stroke-width="0.8"/>
    <!-- Door handle dots left panels -->
    <circle cx="53" cy="62" r="2" fill="#1a1a1a"/>
    <circle cx="53" cy="30" r="2" fill="#1a1a1a"/>
    <circle cx="53" cy="94" r="2" fill="#1a1a1a"/>

    <!-- RIGHT HALF — wood grain rings (concentric arcs) -->
    <!-- Ring arcs centred around right half midpoint ~82,60 -->
    <path d="M60 60 Q71 48 82 60 Q93 72 82 84" fill="none" stroke="#1a1a1a" stroke-width="0.9"/>
    <path d="M60 60 Q68 44 82 60 Q96 76 82 92" fill="none" stroke="#1a1a1a" stroke-width="0.7"/>
    <path d="M60 60 Q65 38 82 60 Q99 82 82 104" fill="none" stroke="#1a1a1a" stroke-width="0.55"/>
    <path d="M60 60 Q62 28 82 60 Q102 92 82 114" fill="none" stroke="#1a1a1a" stroke-width="0.4" opacity="0.7"/>
    <!-- Centre knot -->
    <circle cx="82" cy="60" r="3.5" fill="none" stroke="#1a1a1a" stroke-width="0.9"/>
    <circle cx="82" cy="60" r="1.5" fill="#1a1a1a"/>
  </g>

  <!-- ── DIVIDER ── -->
  <line x1="118" y1="16" x2="118" y2="104" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>

  <!-- ── WORDMARK ── -->
  <text x="134" y="58" font-family="'Libre Baskerville', Georgia, serif" font-size="28" font-weight="400" letter-spacing="5" fill="#1a1a1a">CASALITHIC</text>
  <text x="136" y="77" font-family="'Libre Baskerville', Georgia, serif" font-size="9" font-weight="400" letter-spacing="6.5" fill="#1a1a1a" opacity="0.58">INTERIORS &amp; FURNISHINGS</text>
</svg>
